# ============================================================
# Production Profile — hardened settings
# Activate with: java -jar app.jar --spring.profiles.active=prod
# ============================================================

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  sql:
    init:
      mode: never

# ---- Production Logging — JSON structured + reduced verbosity ----
logging:
  level:
    root: WARN
    com.ragchatbot: INFO
    org.springframework.ai: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: ERROR
  pattern:
    # JSON structured logging for log aggregation (ELK, Datadog, CloudWatch)
    console: '{"timestamp":"%d{yyyy-MM-dd''T''HH:mm:ss.SSSZ}","level":"%level","logger":"%logger{36}","thread":"%thread","message":"%msg"}%n'

# ---- Actuator — expose only safe endpoints ----
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

# ---- Server hardening ----
server:
  error:
    include-stacktrace: never
    include-message: never
