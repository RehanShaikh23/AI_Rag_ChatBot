server:
  port: 8081
  servlet:
    context-path: /

# ============================================================
# Spring Configuration
# ============================================================
spring:
  application:
    name: rag-chatbot

  # ---- Database (PostgreSQL) ----
  datasource:
    url: jdbc:postgresql://${DB_HOST:db.vgoyslpzebeqtvmyuspr.supabase.co}:${DB_PORT:5432}/${DB_NAME:postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Ai_Chat_Bot@23}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  # ---- SQL Init (PGVector extension) ----
  sql:
    init:
      mode: always
      continue-on-error: true

  # ---- File Upload ----
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # ---- Spring AI — NVIDIA NIM (OpenAI-compatible) ----
  ai:
    openai:
      api-key: ${NVIDIA_API_KEY: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}
      base-url: https://integrate.api.nvidia.com
      chat:
        options:
          model: meta/llama-3.1-8b-instruct
          temperature: 0.7
          max-tokens: 1024
      embedding:
        options:
          model: nvidia/nv-embedqa-e5-v5

    # ---- PGVector Store ----
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024
        initialize-schema: true

# ============================================================
# JWT Configuration
# ============================================================
app:
  jwt:
    secret: ${JWT_SECRET:f47ac10b58cc4372a5670e02b2c3d479a7f3e8b1c2d4e5f6a7b8c9d0e1f2a3b4}
    expiration-ms: 86400000       # 24 hours
    refresh-expiration-ms: 604800000  # 7 days

  # ---- Rate Limiting ----
  rate-limit:
    chat:
      capacity: 30
      refill-tokens: 30
      refill-duration-minutes: 1
    document:
      capacity: 10
      refill-tokens: 10
      refill-duration-minutes: 5

  # ---- RAG Settings ----
  rag:
    chunk-size: 400
    chunk-overlap: 100
    max-results: 10
    similarity-threshold: 0.1
    full-doc-chunk-threshold: 15   # docs with ≤ this many chunks → send full text

  # ---- CORS ----
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true

# ============================================================
# Logging
# ============================================================
logging:
  level:
    root: INFO
    com.ragchatbot: DEBUG
    org.springframework.ai: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} — %msg%n"

# ============================================================
# Swagger / OpenAPI
# ============================================================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  default-produces-media-type: application/json
