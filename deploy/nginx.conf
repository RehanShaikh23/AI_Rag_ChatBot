# ============================================================
# NGINX Reverse Proxy Configuration for AI RAG ChatBot
# ============================================================
#
# Usage:
#   1. Place this file at /etc/nginx/conf.d/ragchatbot.conf
#   2. Update server_name with your actual domain
#   3. Update SSL certificate paths
#   4. Run: nginx -t && systemctl reload nginx
#
# This config handles:
#   - HTTPS termination with SSL/TLS
#   - Frontend static file serving
#   - API reverse proxy to Spring Boot backend
#   - SSE streaming (critical: buffering disabled)
#   - Security headers

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com www.your-domain.com;

    # ---- SSL Configuration ----
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ---- Security Headers ----
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'";

    # ---- Frontend — Serve static files ----
    root /var/www/ragchatbot/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;  # SPA fallback
    }

    # ---- API — Reverse proxy to Spring Boot ----
    location /api/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # File upload support (match Spring Boot's 10MB limit)
        client_max_body_size 10M;

        # ---- CRITICAL: SSE Streaming Support ----
        # Without these settings, nginx will buffer SSE responses
        # and the client will receive them in large chunks instead
        # of token-by-token.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;

        # SSE connections can be long-lived (match backend's 5-min timeout)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ---- Actuator (restrict to internal / monitoring IPs) ----
    location /actuator/ {
        proxy_pass http://127.0.0.1:8081;
        # Uncomment to restrict access:
        # allow 10.0.0.0/8;
        # deny all;
    }

    # ---- Gzip Compression ----
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;
}
